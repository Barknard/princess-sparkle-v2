<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Tagger — V2 Map Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a; color: #ccc;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100vh; overflow: hidden; user-select: none;
}
.app {
  display: grid; height: 100vh;
  grid-template-rows: 42px 1fr;
  grid-template-columns: 1fr 340px;
  gap: 6px; padding: 6px;
}
.header {
  grid-column: 1 / -1;
  background: #141428; border: 1px solid #2a2a3e; border-radius: 8px;
  display: flex; align-items: center; padding: 0 16px; gap: 16px;
  font-family: monospace; font-size: 13px;
}
.header .title { font-weight: bold; color: #a855f7; font-size: 14px; }
.header a { color: #22d3ee; text-decoration: none; }
.header button {
  background: #2a2a3e; color: #ccc; border: 1px solid #3a3a5e;
  border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 12px;
}
.header button:hover { background: #3a3a5e; }
.header .saved { color: #4ade80; font-size: 11px; opacity: 0; transition: opacity 0.3s; }
.header .saved.show { opacity: 1; }

/* Tile Grid */
.tile-grid {
  background: #141428; border: 1px solid #2a2a3e; border-radius: 8px;
  padding: 12px; overflow-y: auto;
}
.tile-grid-inner {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
}
.tile-cell {
  position: relative; aspect-ratio: 1;
  border: 2px solid transparent; border-radius: 4px;
  cursor: pointer; background: #0a0a1a;
  transition: border-color 0.1s;
}
.tile-cell canvas {
  width: 100%; height: 100%; image-rendering: pixelated; display: block;
}
.tile-cell:hover { border-color: #555; }
.tile-cell.selected { border-color: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.4); }
.tile-cell .id {
  position: absolute; bottom: 1px; right: 2px;
  font-size: 9px; color: #888; font-family: monospace;
}
.tile-cell .tag-dots {
  position: absolute; top: 1px; left: 2px;
  display: flex; gap: 1px; flex-wrap: wrap; max-width: 80%;
}
.tile-cell .tag-dot {
  width: 5px; height: 5px; border-radius: 50%;
}

/* Tag Panel */
.tag-panel {
  background: #141428; border: 1px solid #2a2a3e; border-radius: 8px;
  padding: 12px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.tag-panel h3 { color: #a855f7; font-size: 14px; }
.tag-section { margin-bottom: 8px; }
.tag-section-title {
  font-size: 11px; color: #888; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px;
}
.tag-btn {
  display: inline-block; padding: 4px 10px; margin: 2px;
  border-radius: 12px; font-size: 11px; cursor: pointer;
  border: 1px solid #333; background: #1a1a2a; color: #aaa;
  transition: all 0.15s;
}
.tag-btn:hover { border-color: #555; background: #222; }
.tag-btn.active { border-color: #a855f7; background: #2a1a3a; color: #d8b4fe; }
.tag-btn.partial { border-color: #d97706; background: #2a1a1a; color: #fbbf24; }

.selection-info {
  background: #0a0a1a; border: 1px solid #2a2a3e; border-radius: 6px;
  padding: 8px; font-size: 12px; min-height: 40px;
}
.custom-tag-input {
  display: flex; gap: 4px; margin-top: 4px;
}
.custom-tag-input input {
  flex: 1; background: #0a0a1a; border: 1px solid #333;
  border-radius: 4px; padding: 4px 8px; color: #ccc; font-size: 12px;
}
.custom-tag-input button {
  background: #2a2a3e; color: #ccc; border: 1px solid #3a3a5e;
  border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px;
}
.filter-bar {
  display: flex; gap: 4px; align-items: center; font-size: 11px;
}
.filter-bar input {
  flex: 1; background: #0a0a1a; border: 1px solid #333;
  border-radius: 4px; padding: 3px 6px; color: #ccc; font-size: 11px;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="title">Tile Tagger</span>
    <span id="sel-count">0 selected</span>
    <button onclick="clearSelection()">Clear Selection</button>
    <button onclick="selectAll()">Select All</button>
    <button onclick="saveTags()">Save Tags</button>
    <span class="saved" id="saved-msg">Saved!</span>
    <span style="flex:1"></span>
    <a href="/">Dashboard</a>
    <a href="/paint">Painter</a>
  </div>

  <div class="tile-grid">
    <div class="filter-bar" style="margin-bottom:8px">
      <span>Filter:</span>
      <input type="text" id="filter-input" placeholder="Type tag to filter tiles..." oninput="filterTiles()">
      <button onclick="document.getElementById('filter-input').value='';filterTiles()">Clear</button>
    </div>
    <div class="tile-grid-inner" id="tile-grid"></div>
  </div>

  <div class="tag-panel">
    <h3>Tags for Selection</h3>
    <div class="selection-info" id="selection-info">Select tiles to tag them</div>

    <div class="tag-section">
      <div class="tag-section-title">Layer</div>
      <div id="tags-layer"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Gameplay</div>
      <div id="tags-gameplay"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Structure</div>
      <div id="tags-structure"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Material</div>
      <div id="tags-material"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Position</div>
      <div id="tags-position"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Nature</div>
      <div id="tags-nature"></div>
    </div>
    <div class="tag-section">
      <div class="tag-section-title">Custom</div>
      <div id="tags-custom"></div>
      <div class="custom-tag-input">
        <input type="text" id="custom-tag-input" placeholder="New tag..." onkeydown="if(event.key==='Enter')addCustomTag()">
        <button onclick="addCustomTag()">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Standard Tags ──────────────────────────────────────
var TAG_GROUPS = {
  layer: [
    { tag: 'ground', color: '#4ade80', desc: 'Goes on ground layer' },
    { tag: 'objects', color: '#facc15', desc: 'Goes on objects layer' },
    { tag: 'foreground', color: '#22d3ee', desc: 'Goes on foreground layer (over player)' },
  ],
  gameplay: [
    { tag: 'walkable', color: '#4ade80', desc: 'Player can walk through' },
    { tag: 'solid', color: '#ef4444', desc: 'Blocks player movement' },
    { tag: 'path', color: '#d97706', desc: 'Can be used as a path/road' },
    { tag: 'interactable', color: '#a855f7', desc: 'Player can interact with' },
    { tag: 'animated', color: '#ec4899', desc: 'Has animation frames' },
    { tag: 'deprecated', color: '#666', desc: 'Do not use in generation' },
  ],
  structure: [
    { tag: 'roof', color: '#ef4444', desc: 'Building roof tile' },
    { tag: 'wall', color: '#d97706', desc: 'Building wall tile' },
    { tag: 'door', color: '#22d3ee', desc: 'Building entrance/door' },
    { tag: 'window', color: '#60a5fa', desc: 'Wall with window' },
    { tag: 'fence', color: '#a3a3a3', desc: 'Fence/barrier piece' },
    { tag: 'castle', color: '#8b5cf6', desc: 'Castle/fortress piece' },
    { tag: 'building', color: '#f97316', desc: 'Part of a building' },
    { tag: 'decoration', color: '#ec4899', desc: 'Decorative object' },
  ],
  material: [
    { tag: 'red', color: '#ef4444' }, { tag: 'blue', color: '#3b82f6' },
    { tag: 'gray', color: '#9ca3af' }, { tag: 'stone', color: '#78716c' },
    { tag: 'wood', color: '#a16207' }, { tag: 'brick', color: '#dc2626' },
    { tag: 'white', color: '#e5e7eb' }, { tag: 'brown', color: '#92400e' },
  ],
  position: [
    { tag: 'left', color: '#60a5fa' }, { tag: 'center', color: '#a78bfa' },
    { tag: 'right', color: '#34d399' }, { tag: 'top', color: '#fbbf24' },
    { tag: 'bottom', color: '#f87171' }, { tag: 'middle', color: '#c084fc' },
  ],
  nature: [
    { tag: 'tree', color: '#22c55e' }, { tag: 'canopy', color: '#16a34a' },
    { tag: 'trunk', color: '#854d0e' }, { tag: 'bush', color: '#65a30d' },
    { tag: 'flower', color: '#f472b6' }, { tag: 'grass', color: '#4ade80' },
    { tag: 'water', color: '#38bdf8' }, { tag: 'dirt', color: '#a16207' },
  ],
};

// ── State ──────────────────────────────────────────────
var tileset = null;
var tileCanvases = {}; // id → canvas
var selectedTiles = new Set();
var tileTags = {}; // id → Set of tags
var customTags = []; // user-added tag names
var isDragging = false;
var dragMode = null; // 'select' or 'deselect'

// ── Init ───────────────────────────────────────────────
var img = new Image();
img.onload = function() {
  tileset = img;
  buildGrid();
  loadTags();
};
img.src = '/tilemap';

function buildGrid() {
  var grid = document.getElementById('tile-grid');
  var inner = grid.querySelector('.tile-grid-inner');
  inner.innerHTML = '';
  for (var id = 0; id < 132; id++) {
    var cell = document.createElement('div');
    cell.className = 'tile-cell';
    cell.dataset.id = id;
    // Draw tile
    var c = document.createElement('canvas');
    c.width = 16; c.height = 16;
    var sx = (id % 12) * 16, sy = Math.floor(id / 12) * 16;
    c.getContext('2d').drawImage(tileset, sx, sy, 16, 16, 0, 0, 16, 16);
    tileCanvases[id] = c;
    cell.appendChild(c);
    // ID label
    var lbl = document.createElement('div');
    lbl.className = 'id'; lbl.textContent = id;
    cell.appendChild(lbl);
    // Tag dots container
    var dots = document.createElement('div');
    dots.className = 'tag-dots'; dots.id = 'dots-' + id;
    cell.appendChild(dots);
    // Events
    cell.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var tid = parseInt(this.dataset.id);
      if (selectedTiles.has(tid)) { dragMode = 'deselect'; selectedTiles.delete(tid); }
      else { dragMode = 'select'; selectedTiles.add(tid); }
      isDragging = true;
      updateSelection();
    });
    cell.addEventListener('mouseenter', function() {
      if (!isDragging) return;
      var tid = parseInt(this.dataset.id);
      if (dragMode === 'select') selectedTiles.add(tid);
      else selectedTiles.delete(tid);
      updateSelection();
    });
    inner.appendChild(cell);
  }
  document.addEventListener('mouseup', function() { isDragging = false; });
}

function updateSelection() {
  document.querySelectorAll('.tile-cell').forEach(function(cell) {
    var id = parseInt(cell.dataset.id);
    cell.classList.toggle('selected', selectedTiles.has(id));
  });
  document.getElementById('sel-count').textContent = selectedTiles.size + ' selected';
  updateTagButtons();
  updateSelectionInfo();
}

function clearSelection() { selectedTiles.clear(); updateSelection(); }
function selectAll() { for (var i = 0; i < 132; i++) selectedTiles.add(i); updateSelection(); }

// ── Tag Buttons ────────────────────────────────────────
function buildTagButtons() {
  for (var group in TAG_GROUPS) {
    var container = document.getElementById('tags-' + group);
    if (!container) continue;
    container.innerHTML = '';
    TAG_GROUPS[group].forEach(function(t) {
      var btn = document.createElement('span');
      btn.className = 'tag-btn';
      btn.dataset.tag = t.tag;
      btn.textContent = t.tag;
      btn.title = t.desc || t.tag;
      btn.style.borderLeftColor = t.color;
      btn.style.borderLeftWidth = '3px';
      btn.addEventListener('click', function() { toggleTag(this.dataset.tag); });
      container.appendChild(btn);
    });
  }
  renderCustomTags();
}

function renderCustomTags() {
  var container = document.getElementById('tags-custom');
  // Keep only the input area, rebuild tag buttons
  var buttons = container.querySelectorAll('.tag-btn');
  buttons.forEach(function(b) { b.remove(); });
  customTags.forEach(function(tag) {
    var btn = document.createElement('span');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    btn.style.borderLeftColor = '#888';
    btn.style.borderLeftWidth = '3px';
    btn.addEventListener('click', function() { toggleTag(this.dataset.tag); });
    container.insertBefore(btn, container.querySelector('.custom-tag-input'));
  });
}

function addCustomTag() {
  var input = document.getElementById('custom-tag-input');
  var tag = input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  if (!tag) return;
  if (!customTags.includes(tag)) {
    customTags.push(tag);
    renderCustomTags();
  }
  input.value = '';
  // Auto-apply to selection
  toggleTag(tag);
}

function toggleTag(tag) {
  if (selectedTiles.size === 0) return;
  // Check if ALL selected tiles have this tag
  var allHave = true;
  selectedTiles.forEach(function(id) {
    if (!tileTags[id] || !tileTags[id].has(tag)) allHave = false;
  });
  // Toggle: if all have it, remove from all. Otherwise, add to all.
  selectedTiles.forEach(function(id) {
    if (!tileTags[id]) tileTags[id] = new Set();
    if (allHave) tileTags[id].delete(tag);
    else tileTags[id].add(tag);
  });
  updateTagButtons();
  updateDots();
  autoSave();
}

function updateTagButtons() {
  document.querySelectorAll('.tag-btn').forEach(function(btn) {
    var tag = btn.dataset.tag;
    if (selectedTiles.size === 0) {
      btn.classList.remove('active', 'partial');
      return;
    }
    var count = 0;
    selectedTiles.forEach(function(id) {
      if (tileTags[id] && tileTags[id].has(tag)) count++;
    });
    btn.classList.toggle('active', count === selectedTiles.size);
    btn.classList.toggle('partial', count > 0 && count < selectedTiles.size);
  });
}

function updateSelectionInfo() {
  var el = document.getElementById('selection-info');
  if (selectedTiles.size === 0) { el.innerHTML = 'Select tiles to tag them'; return; }
  if (selectedTiles.size === 1) {
    var id = [...selectedTiles][0];
    var tags = tileTags[id] ? [...tileTags[id]].join(', ') : 'none';
    el.innerHTML = '<b>Tile ' + id + '</b><br>Tags: ' + tags;
  } else {
    // Find common tags
    var common = null;
    selectedTiles.forEach(function(id) {
      var t = tileTags[id] ? new Set(tileTags[id]) : new Set();
      if (!common) common = t;
      else common = new Set([...common].filter(function(x) { return t.has(x); }));
    });
    el.innerHTML = '<b>' + selectedTiles.size + ' tiles</b><br>Common tags: ' + (common && common.size ? [...common].join(', ') : 'none');
  }
}

function updateDots() {
  var tagColors = {};
  for (var group in TAG_GROUPS) {
    TAG_GROUPS[group].forEach(function(t) { tagColors[t.tag] = t.color; });
  }
  for (var id = 0; id < 132; id++) {
    var dotsEl = document.getElementById('dots-' + id);
    if (!dotsEl) continue;
    dotsEl.innerHTML = '';
    if (tileTags[id]) {
      tileTags[id].forEach(function(tag) {
        var dot = document.createElement('div');
        dot.className = 'tag-dot';
        dot.style.background = tagColors[tag] || '#888';
        dot.title = tag;
        dotsEl.appendChild(dot);
      });
    }
  }
}

// ── Filter ─────────────────────────────────────────────
function filterTiles() {
  var query = document.getElementById('filter-input').value.trim().toLowerCase();
  document.querySelectorAll('.tile-cell').forEach(function(cell) {
    var id = parseInt(cell.dataset.id);
    if (!query) { cell.style.display = ''; return; }
    var tags = tileTags[id] ? [...tileTags[id]] : [];
    var match = tags.some(function(t) { return t.includes(query); });
    cell.style.display = match ? '' : 'none';
  });
}

// ── Save / Load ────────────────────────────────────────
function saveTags() {
  var data = {};
  for (var id in tileTags) {
    if (tileTags[id] && tileTags[id].size > 0) {
      data[id] = [...tileTags[id]];
    }
  }
  data._customTags = customTags;
  fetch('/api/tile-tags', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function() {
    var msg = document.getElementById('saved-msg');
    msg.classList.add('show');
    setTimeout(function() { msg.classList.remove('show'); }, 2000);
  });
  localStorage.setItem('tile-tags', JSON.stringify(data));
}

var _autoSaveTimer = null;
function autoSave() {
  // Save immediately to server — no delay, real-time
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveTags, 300); // 300ms debounce for rapid clicking
}

function loadTags() {
  // Try server first, fallback to localStorage
  fetch('/api/tile-tags').then(function(r) { return r.json(); }).then(function(data) {
    applyLoadedTags(data);
  }).catch(function() {
    try {
      var data = JSON.parse(localStorage.getItem('tile-tags'));
      if (data) applyLoadedTags(data);
    } catch(e) {}
  });
}

function applyLoadedTags(data) {
  tileTags = {};
  customTags = data._customTags || [];
  for (var id in data) {
    if (id === '_customTags') continue;
    if (Array.isArray(data[id])) {
      tileTags[parseInt(id)] = new Set(data[id]);
    }
  }
  renderCustomTags();
  updateDots();
  updateTagButtons();
}

// ── Init ───────────────────────────────────────────────
buildTagButtons();
</script>
</body>
</html>
