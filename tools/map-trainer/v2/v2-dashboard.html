<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 Map Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #ccc;
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* в”Ђв”Ђ Grid Layout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .dashboard {
    display: grid;
    height: 100vh;
    grid-template-rows: 42px 1fr 1fr;
    grid-template-columns: 100px 1fr 320px;
    grid-template-areas:
      "header  header   header"
      "kpis    charts   right-top"
      "kpis    charts   right-bot";
    resize: both;
    gap: 6px;
    padding: 6px;
  }

  /* Header spans full width */
  .header {
    grid-column: 1 / -1;
    background: #141428;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    font-family: monospace;
    font-size: 13px;
  }

  .header .title {
    font-weight: bold;
    color: #a855f7;
    font-size: 14px;
    white-space: nowrap;
  }

  .header .stat {
    color: #888;
    white-space: nowrap;
  }
  .header .stat b {
    color: #fff;
  }

  .header .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 4px;
    animation: pulse 1.5s infinite;
  }
  .header .live-dot.idle {
    background: #555;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* в”Ђв”Ђ Panels в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .panel {
    background: #141428;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    padding: 6px 10px 2px;
    flex-shrink: 0;
  }

  /* KPI Cards вЂ” left column, spans 2 rows */
  .kpi-col {
    grid-row: 2 / 4;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .kpi-card {
    background: #141428;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .kpi-card .kpi-value {
    font-family: monospace;
    font-size: 26px;
    font-weight: bold;
    line-height: 1.1;
  }

  .kpi-card .kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-top: 2px;
  }

  .kpi-purple .kpi-value { color: #a855f7; }
  .kpi-blue .kpi-value { color: #3b82f6; }
  .kpi-white .kpi-value { color: #e0e0e0; }
  .kpi-gray .kpi-value { color: #888; }

  /* Score chart вЂ” main area, row 1 */
  .chart-panel {
    grid-column: 2 / 3;
    grid-row: 2;
  }

  .chart-panel canvas {
    width: 100%;
    height: 100%;
  }

  /* Map previews вЂ” row 1 right */
  .map-preview {
    display: flex;
    flex-direction: column;
  }

  .map-preview img {
    flex: 1;
    width: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    cursor: pointer;
    min-height: 0;
  }

  /* Bottom row */
  .radar-panel {
    grid-column: 2;
    grid-row: 3;
  }

  .radar-panel canvas {
    width: 100%;
    height: 100%;
  }

  .log-panel {
    grid-column: 3;
    grid-row: 3;
  }

  .log-content {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    font-family: monospace;
    font-size: 10px;
    line-height: 1.5;
    min-height: 0;
  }

  .log-content::-webkit-scrollbar { width: 4px; }
  .log-content::-webkit-scrollbar-track { background: #0a0a1a; }
  .log-content::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }

  .log-line { white-space: nowrap; }
  .log-line.improvement { color: #22c55e; }
  .log-line.plateau { color: #eab308; }
  .log-line.normal { color: #666; }

  .heatmap-panel {
    grid-column: 4;
    grid-row: 3;
  }

  .heatmap-panel canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  /* в”Ђв”Ђ Lightbox в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }

  .lightbox.active {
    display: flex;
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    image-rendering: pixelated;
  }

  /* в”Ђв”Ђ Controls in header в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .header button {
    background: #2a2a3e;
    color: #ccc;
    border: 1px solid #3a3a5e;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: monospace;
    cursor: pointer;
  }
  .header button:hover {
    background: #3a3a5e;
    color: #fff;
  }
</style>
</head>
<body>
<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <span class="title">V2 Map Trainer</span>
    <span class="stat">Gen <b id="h-gen">0</b>/<b id="h-max">5000</b></span>
    <span class="stat"><span class="live-dot" id="h-dot"></span><span id="h-status">IDLE</span></span>
    <span class="stat">Best: <b id="h-best" style="color:#a855f7">0.0</b></span>
    <span class="stat">ETA: <b id="h-eta">--</b></span>
    <span class="stat">Rules: <b id="h-rules">0</b></span>
    <button id="btn-stop" onclick="doStop()">Stop</button>
    <button id="btn-start" onclick="doStart()">Start</button>
    <a href="/annotate" style="color:#a855f7; text-decoration:none; font-size:11px; margin-left:8px;">Annotator в†’</a>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-col" style="grid-area: kpis;">
    <div class="kpi-card kpi-purple">
      <div class="kpi-value" id="kpi-best">0.0</div>
      <div class="kpi-label">Best Score</div>
    </div>
    <div class="kpi-card kpi-blue">
      <div class="kpi-value" id="kpi-tile">0.0%</div>
      <div class="kpi-label">Tile Match</div>
    </div>
    <div class="kpi-card kpi-white">
      <div class="kpi-value" id="kpi-gen">0</div>
      <div class="kpi-label">Generation</div>
    </div>
    <div class="kpi-card kpi-gray">
      <div class="kpi-value" id="kpi-speed">0.0</div>
      <div class="kpi-label">gen/s</div>
    </div>
  </div>

  <!-- CENTER: Radar on top, Chart below (stacked) -->
  <div style="grid-area: charts; display:flex; flex-direction:column; gap:6px; overflow:hidden;">
    <div class="panel radar-panel" style="flex:1; min-height:0;">
      <div class="panel-title">Quality Breakdown</div>
      <canvas id="radar"></canvas>
    </div>
    <div class="panel chart-panel" style="flex:1; min-height:0;">
      <div class="panel-title">Score History</div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- RIGHT TOP: Best Map + Reference stacked -->
  <div class="panel" style="grid-area: right-top; display:flex; flex-direction:column; gap:3px; overflow:hidden;">
    <div style="flex:1; min-height:0;">
      <div class="panel-title">Generated (24Г—14)</div>
      <img id="best-map" src="/api/best-map" alt="Best map" onclick="openLightbox(this.src)" style="width:100%; height:calc(100% - 16px); object-fit:contain; image-rendering:pixelated; cursor:zoom-in;">
    </div>
    <div style="flex:1; min-height:0; position:relative;">
      <div class="panel-title">Target (24Г—14) <span id="grid-count" style="color:#a855f7; margin-left:6px; font-size:9px;">336 tiles Г— 3 layers</span></div>
      <div style="position:relative; width:100%; height:calc(100% - 16px);">
        <img id="ref-map" src="/reference" alt="Reference" onclick="openLightbox(this.src)" style="width:100%; height:100%; object-fit:contain; image-rendering:pixelated; cursor:zoom-in;">
        <canvas id="grid-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; image-rendering:pixelated;"></canvas>
      </div>
    </div>
  </div>

  <!-- RIGHT BOTTOM: Log + Heatmap stacked -->
  <div class="panel" style="grid-area: right-bot; display:flex; flex-direction:column; gap:3px; overflow:hidden;">
    <div style="flex:1; min-height:0; display:flex; flex-direction:column;">
      <div class="panel-title">Live Log</div>
      <div class="log-content" id="log" style="flex:1; overflow-y:auto;"></div>
    </div>
    <div style="flex:0 0 80px; overflow:hidden;">
      <div class="panel-title">Tile Match Heatmap</div>
      <canvas id="heatmap" width="240" height="64" style="width:100%; height:64px; image-rendering:pixelated;"></canvas>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<script>
// в”Ђв”Ђ Lightbox в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Draw grid overlay on reference image
function drawGridOverlay() {
  var refImg = document.getElementById('ref-map');
  var canvas = document.getElementById('grid-overlay');
  if (!refImg || !canvas || !refImg.naturalWidth) return;

  // Match canvas to displayed image size
  var rect = refImg.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // The reference is 60x40 tiles at 16px each = 960x640
  // Scale to fit the displayed image
  var tileW = canvas.width / 24;
  var tileH = canvas.height / 14;

  ctx.strokeStyle = 'rgba(168, 85, 247, 0.2)';
  ctx.lineWidth = 0.5;

  // Vertical lines
  for (var x = 0; x <= 24; x++) {
    ctx.beginPath();
    ctx.moveTo(x * tileW, 0);
    ctx.lineTo(x * tileW, canvas.height);
    ctx.stroke();
  }
  // Horizontal lines
  for (var y = 0; y <= 14; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * tileH);
    ctx.lineTo(canvas.width, y * tileH);
    ctx.stroke();
  }

  document.getElementById('grid-count').textContent = '24Г—14 = 336 tiles (3 layers)';
}

// Draw grid once ref image loads, and on resize
document.getElementById('ref-map').onload = drawGridOverlay;
window.addEventListener('resize', drawGridOverlay);
setTimeout(drawGridOverlay, 2000);

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// в”Ђв”Ђ Canvas resize helper в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function fitCanvas(canvas) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const titleEl = canvas.parentElement.querySelector('.panel-title');
  const titleH = titleEl ? titleEl.offsetHeight : 0;
  const dpr = window.devicePixelRatio || 1;
  const w = Math.floor(rect.width);
  const h = Math.floor(rect.height - titleH);
  if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.getContext('2d').scale(dpr, dpr);
  }
  return { w, h };
}

// в”Ђв”Ђ Score Chart в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawChart(canvas, history, target) {
  const { w: W, h: H } = fitCanvas(canvas);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const PAD_L = 30, PAD_R = 10, PAD_T = 10, PAD_B = 20;
  const cw = W - PAD_L - PAD_R;
  const ch = H - PAD_T - PAD_B;

  // Grid lines
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  for (let y = 0; y <= 100; y += 20) {
    const py = PAD_T + ch - (y / 100) * ch;
    ctx.beginPath(); ctx.moveTo(PAD_L, py); ctx.lineTo(PAD_L + cw, py); ctx.stroke();
    ctx.fillStyle = '#444';
    ctx.fillText(y, PAD_L - 4, py + 3);
  }

  // Target line
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 1;
  const ty = PAD_T + ch - (target / 100) * ch;
  ctx.beginPath(); ctx.moveTo(PAD_L, ty); ctx.lineTo(PAD_L + cw, ty); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#22c55e';
  ctx.textAlign = 'left';
  ctx.fillText('Target ' + target, PAD_L + cw - 60, ty - 4);

  if (!history || history.length < 2) return;
  const data = history.slice(-200);
  const xScale = cw / (data.length - 1);

  function mapX(i) { return PAD_L + i * xScale; }
  function mapY(v) { return PAD_T + ch - ((v || 0) / 100) * ch; }

  // Average line (gray)
  ctx.beginPath();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  data.forEach(function(d, i) {
    var x = mapX(i), y = mapY(d.avg);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Best score area fill
  var grad = ctx.createLinearGradient(0, PAD_T, 0, PAD_T + ch);
  grad.addColorStop(0, 'rgba(168, 85, 247, 0.25)');
  grad.addColorStop(1, 'rgba(168, 85, 247, 0.0)');
  ctx.beginPath();
  ctx.moveTo(mapX(0), PAD_T + ch);
  data.forEach(function(d, i) { ctx.lineTo(mapX(i), mapY(d.best)); });
  ctx.lineTo(mapX(data.length - 1), PAD_T + ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Best score line
  ctx.beginPath();
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  data.forEach(function(d, i) {
    var x = mapX(i), y = mapY(d.best);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Current dot
  var last = data[data.length - 1];
  var cx = mapX(data.length - 1), cy = mapY(last.best);
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#a855f7'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText((last.best || 0).toFixed(1), cx - 8, cy - 8);

  // X axis labels
  ctx.fillStyle = '#444'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  if (data.length > 0) {
    ctx.fillText(data[0].gen, mapX(0), PAD_T + ch + 14);
    ctx.fillText(data[data.length - 1].gen, mapX(data.length - 1), PAD_T + ch + 14);
    if (data.length > 4) {
      var mid = Math.floor(data.length / 2);
      ctx.fillText(data[mid].gen, mapX(mid), PAD_T + ch + 14);
    }
  }
}

// в”Ђв”Ђ Radar Chart в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawRadar(canvas, breakdown) {
  var size = fitCanvas(canvas);
  var W = size.w, H = size.h;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  var cx = W / 2, cy = H / 2;
  var R = Math.min(cx, cy) - 30;
  if (R < 20) return;

  var dims = ['pathNetwork', 'buildings', 'treeQuality', 'decorations', 'groundTexture', 'composition', 'waterFeature', 'villageFeel'];
  var labels = ['Paths', 'Buildings', 'Trees', 'Decor', 'Ground', 'Layout', 'Water', 'Feel'];
  var maxValues = [10, 10, 10, 10, 10, 10, 5, 5];
  var n = dims.length;

  // Grid rings
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (var ring = 0.2; ring <= 1.001; ring += 0.2) {
    ctx.beginPath();
    for (var i = 0; i <= n; i++) {
      var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      var x = cx + Math.cos(angle) * R * ring;
      var y = cy + Math.sin(angle) * R * ring;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Axis lines + labels
  ctx.strokeStyle = '#2a2a4a';
  ctx.fillStyle = '#888';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < n; i++) {
    var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * R, cy + Math.sin(angle) * R);
    ctx.stroke();
    var lx = cx + Math.cos(angle) * (R + 18);
    var ly = cy + Math.sin(angle) * (R + 18);
    ctx.fillText(labels[i], lx, ly);
  }

  // Data polygon
  if (!breakdown) return;
  ctx.beginPath();
  for (var i = 0; i < n; i++) {
    var val = Math.min(1, (breakdown[dims[i]] || 0) / maxValues[i]);
    var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    var x = cx + Math.cos(angle) * R * val;
    var y = cy + Math.sin(angle) * R * val;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(168, 85, 247, 0.3)';
  ctx.fill();
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data dots
  ctx.fillStyle = '#a855f7';
  for (var i = 0; i < n; i++) {
    var val = Math.min(1, (breakdown[dims[i]] || 0) / maxValues[i]);
    var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    var x = cx + Math.cos(angle) * R * val;
    var y = cy + Math.sin(angle) * R * val;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  }
}

// в”Ђв”Ђ Heatmap в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawHeatmap(canvas, matchGrid, mapW, mapH) {
  var size = fitCanvas(canvas);
  var W = size.w, H = size.h;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (!matchGrid || matchGrid.length === 0) {
    ctx.fillStyle = '#333';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet', W / 2, H / 2);
    return;
  }

  var w = mapW || 60;
  var h = mapH || 40;
  var cellW = W / w;
  var cellH = H / h;

  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var val = matchGrid[y * w + x] || 0; // 0-3 layers matching
      var ratio = val / 3;
      // Perfect match (3/3) = transparent/dark, mismatch = bright red
      // This makes ONLY differences visible вЂ” matched areas fade away
      if (val === 3) { continue; } // skip perfect matches entirely
      var r = Math.round((1 - ratio) * 255);
      var g = Math.round(ratio * 197);
      var b = Math.round((1 - ratio) * 68 + ratio * 94);
      var alpha = 0.4 + ratio * 0.6;
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      ctx.fillRect(x * cellW, y * cellH, Math.ceil(cellW), Math.ceil(cellH));
    }
  }
}

// в”Ђв”Ђ Log в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var lastLogLen = 0;
function updateLog(logEntries) {
  if (!logEntries || logEntries.length === lastLogLen) return;
  lastLogLen = logEntries.length;

  var el = document.getElementById('log');
  var html = '';
  var visible = logEntries.slice(-50);
  for (var i = 0; i < visible.length; i++) {
    var line = visible[i];
    var cls = 'normal';
    if (line.indexOf('TARGET') >= 0 || line.indexOf('improvement') >= 0) cls = 'improvement';
    else if (line.indexOf('PLATEAU') >= 0 || line.indexOf('plateau') >= 0) cls = 'plateau';
    else if (line.indexOf('best=') >= 0) {
      // Check if this gen's best is better than previous
      var m = line.match(/best=([\d.]+)/);
      if (m && i > 0) {
        var prev = visible[i-1].match(/best=([\d.]+)/);
        if (prev && parseFloat(m[1]) > parseFloat(prev[1])) cls = 'improvement';
      }
    }
    html += '<div class="log-line ' + cls + '">' + escHtml(line) + '</div>';
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// в”Ђв”Ђ KPI Update в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function updateKPIs(s) {
  document.getElementById('kpi-best').textContent = (s.bestScore || 0).toFixed(1);
  document.getElementById('kpi-tile').textContent = (s.tileMatch || 0).toFixed(1) + '%';
  document.getElementById('kpi-gen').textContent = s.generation + ' / ' + s.maxGenerations;

  var speed = s.elapsed > 0 ? (s.generation / (s.elapsed / 1000)) : 0;
  document.getElementById('kpi-speed').textContent = speed.toFixed(1);

  // Header
  document.getElementById('h-gen').textContent = s.generation;
  document.getElementById('h-max').textContent = s.maxGenerations;
  document.getElementById('h-best').textContent = (s.bestScore || 0).toFixed(1);
  document.getElementById('h-rules').textContent = s.knowledgeRules || 0;

  var dot = document.getElementById('h-dot');
  var statusEl = document.getElementById('h-status');
  if (s.running) {
    dot.classList.remove('idle');
    statusEl.textContent = 'LIVE';
    statusEl.style.color = '#22c55e';
  } else {
    dot.classList.add('idle');
    statusEl.textContent = 'IDLE';
    statusEl.style.color = '#888';
  }

  // ETA
  if (s.running && speed > 0 && s.generation > 5) {
    var remaining = s.maxGenerations - s.generation;
    var etaSec = remaining / speed;
    var etaStr;
    if (etaSec < 60) etaStr = Math.round(etaSec) + 's';
    else if (etaSec < 3600) etaStr = Math.round(etaSec / 60) + 'm';
    else etaStr = (etaSec / 3600).toFixed(1) + 'h';
    document.getElementById('h-eta').textContent = etaStr;
  } else {
    document.getElementById('h-eta').textContent = '--';
  }
}

// в”Ђв”Ђ Best map image update в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var lastBestGen = -1;
function updateBestMap(s) {
  if (s.bestGeneration !== lastBestGen) {
    lastBestGen = s.bestGeneration;
    var img = document.getElementById('best-map');
    img.src = '/api/best-map?t=' + Date.now();
  }
}

// в”Ђв”Ђ Controls в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function doStop() {
  fetch('/api/stop', { method: 'POST' }).catch(function() {});
}
function doStart() {
  fetch('/api/start', { method: 'POST' }).catch(function() {});
}

// в”Ђв”Ђ Polling loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var chartCanvas = document.getElementById('chart');
var radarCanvas = document.getElementById('radar');
var heatmapCanvas = document.getElementById('heatmap');

async function poll() {
  try {
    var r = await fetch('/api/status');
    var s = await r.json();
    updateKPIs(s);
    drawChart(chartCanvas, s.history, s.target);
    drawRadar(radarCanvas, s.breakdown);
    drawHeatmap(heatmapCanvas, s.matchGrid, 24, 14);
    updateLog(s.log);
    updateBestMap(s);
  } catch (e) {
    // Server not ready yet, ignore
  }
}

// Initial draw + poll
poll();
setInterval(poll, 2000);

// Redraw on resize
window.addEventListener('resize', function() {
  poll();
});
</script>
