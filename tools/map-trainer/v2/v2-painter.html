<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Painter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .main-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  .ref-area { display: flex; overflow: hidden; background: #141428; border-top: 2px solid #a855f733; cursor: ns-resize; }

  .header { grid-area: header; background: #141428; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
  .header h1 { font-size: 14px; font-weight: 700; color: #a855f7; }
  .header a { color: #888; text-decoration: none; font-size: 11px; }
  .header a:hover { color: #a855f7; }
  .header .spacer { flex: 1; }
  .header button { background: #2a2a3e; color: #e0e0e0; border: 1px solid #3a3a5e; border-radius: 4px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
  .header button:hover { background: #3a3a5e; }
  .header button.danger { border-color: #ef4444; color: #ef4444; }
  .header button.danger:hover { background: #2a1010; }
  .header button.primary { background: #a855f7; color: #fff; border-color: #a855f7; }
  .header .info { font-size: 11px; color: #888; }

  .tile-panel { background: #141428; border-right: 2px solid #a855f733; display: flex; flex-direction: column; overflow: hidden; width: 280px; min-width: 150px; max-width: 600px; cursor: ew-resize; }
  .tile-panel-header { padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; border-bottom: 1px solid #2a2a3e; }
  .tile-grid-wrap { flex: 1; overflow-y: auto; padding: 4px; min-height: 0; }
  .tile-grid-wrap::-webkit-scrollbar { width: 4px; }
  .tile-grid-wrap::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 2px; }
  .tile-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; }
  .tile-cell { cursor: pointer; border: 1px solid transparent; border-radius: 1px; image-rendering: pixelated; position: relative; overflow: hidden; }
  .tile-cell:hover { border-color: #a855f788; }
  .tile-cell.selected { border-color: #a855f7; box-shadow: 0 0 6px #a855f7; }
  .tile-cell canvas { width: 100%; height: 100%; image-rendering: pixelated; }
  .tile-cell .tile-id { position: absolute; bottom: 0; right: 1px; font-size: 7px; color: #888; }

  .selected-tile { padding: 8px 10px; border-top: 1px solid #2a2a3e; font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 8px; }
  .selected-tile canvas { width: 32px; height: 32px; image-rendering: pixelated; border: 1px solid #a855f7; }
  .mode-toggle { padding: 6px 10px; border-top: 1px solid #2a2a3e; display: flex; gap: 6px; }
  .mode-btn { flex: 1; padding: 4px; font-size: 10px; border: 1px solid #2a2a3e; background: #0a0a1a; color: #888; border-radius: 4px; cursor: pointer; text-align: center; }
  .mode-btn.active { background: #a855f7; color: #fff; border-color: #a855f7; }

  .canvas-area { flex: 1; position: relative; overflow: hidden; background: #0a0a1a; min-width: 0; }
  .canvas-area canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 8px 20px; border-radius: 6px; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>Tile Painter</h1>
  <a href="/">← Dashboard</a>
  <a href="/annotate">Annotator</a>
  <div class="spacer"></div>
  <span class="info" id="gridInfo">24 × 14 tiles</span>
  <span class="info" id="tileCount">Placed: 0</span>
  <span class="info">Layer:</span>
  <button id="layerGround" class="primary" onclick="setLayer('ground')">Ground</button>
  <button id="layerObjects" onclick="setLayer('objects')">Objects</button>
  <button id="layerForeground" onclick="setLayer('foreground')">Foreground</button>
  <button onclick="undo()" title="Ctrl+Z">Undo</button>
  <button onclick="exportMap()">Export</button>
  <button onclick="downloadPng()">PNG</button>
  <button class="danger" onclick="clearAll()">Clear All</button>
  <span class="info" id="autoSaveStatus" style="color:#22c55e;font-size:9px;"></span>
</div>

<div class="main-area">
<div class="tile-panel" id="tilePanel">
  <div class="tile-panel-header" style="display:flex; justify-content:space-between; align-items:center;">
    <span>Tileset</span>
    <label style="font-size:9px; color:#888; text-transform:none; letter-spacing:0;">
      Zoom: <input type="range" id="tileZoom" min="1" max="6" value="3" style="width:60px; vertical-align:middle;" oninput="setTileZoom(this.value)">
    </label>
  </div>
  <div class="tile-grid-wrap">
    <div class="tile-grid" id="tileGrid"></div>
  </div>
  <div class="selected-tile">
    <canvas id="selectedPreview" width="16" height="16"></canvas>
    <span id="selectedLabel">None selected</span>
  </div>
  <div class="mode-toggle">
    <div class="mode-btn active" id="modePaint" onclick="setMode('paint')">Paint</div>
    <div class="mode-btn" id="modeErase" onclick="setMode('erase')">Erase</div>
    <div class="mode-btn" id="modeFill" onclick="setMode('fill')">Fill</div>
    <div class="mode-btn" id="modeSelect" onclick="setMode('select')">Select</div>
  </div>
  <div id="selectInfo" style="padding:4px 10px; font-size:9px; color:#666; border-top:1px solid #2a2a3e; display:none;">
    <div>Selected: <b id="selectCount">0</b> tiles</div>
    <div style="display:flex; gap:4px; margin-top:4px; flex-wrap:wrap;">
      <button class="mode-btn" onclick="moveSelection()" style="flex:none; padding:2px 6px;">Move (drag)</button>
      <button class="mode-btn" onclick="saveGroup()" style="flex:none; padding:2px 6px;">Save Group</button>
      <button class="mode-btn" onclick="clearSelection()" style="flex:none; padding:2px 6px;">Deselect</button>
      <button class="mode-btn" onclick="deleteSelection()" style="flex:none; padding:2px 6px; color:#ef4444;">Delete</button>
    </div>
    <div id="savedGroups" style="margin-top:4px;"></div>
  </div>
  <div style="padding:6px 10px; border-top:1px solid #2a2a3e;">
    <div style="font-size:9px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Brush</div>
    <div style="display:flex; gap:4px; align-items:center; flex-wrap:wrap;">
      <button class="mode-btn active" id="brush1" onclick="setBrush(1,1)" style="flex:none;width:24px;padding:2px;">1×1</button>
      <button class="mode-btn" id="brush2" onclick="setBrush(2,2)" style="flex:none;width:24px;padding:2px;">2×2</button>
      <button class="mode-btn" id="brush3" onclick="setBrush(3,3)" style="flex:none;width:24px;padding:2px;">3×3</button>
      <button class="mode-btn" id="brush5" onclick="setBrush(5,5)" style="flex:none;width:24px;padding:2px;">5×5</button>
      <button class="mode-btn" id="brushRow" onclick="setBrush(24,1)" style="flex:none;padding:2px;">Row</button>
      <button class="mode-btn" id="brushCol" onclick="setBrush(1,14)" style="flex:none;padding:2px;">Col</button>
      <button class="mode-btn" id="brushAll" onclick="setBrush(24,14)" style="flex:none;padding:2px;">All</button>
    </div>
    <div style="font-size:9px; color:#555; margin-top:3px;" id="brushInfo">1×1</div>
  </div>
</div>

<div class="canvas-area" id="canvasArea">
  <canvas id="mapCanvas"></canvas>
</div>
</div><!-- end main-area -->

<div class="ref-area" id="refArea" style="height:200px;">
  <div style="font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666; writing-mode:vertical-lr; transform:rotate(180deg); padding:4px;">Reference<br><span style="font-size:7px;color:#a855f7;">Drag to grab tile</span></div>
  <div style="position:relative; height:100%; flex:1;">
    <img id="refImg" src="/reference" style="height:100%; object-fit:contain; image-rendering:pixelated; padding:4px;">
    <canvas id="refCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair;"></canvas>
  </div>
  <div id="customTiles" style="display:flex; flex-wrap:wrap; gap:2px; padding:4px; overflow-y:auto; min-width:52px; align-content:flex-start;">
    <div style="font-size:8px; color:#666; width:100%; text-align:center;">Custom Tiles</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TILE_SIZE = 16;
const COLS = 12;
const ROWS = 11;
const TOTAL_TILES = 132;
const MAP_W = 24;
const MAP_H = 14;

// Map data: 3 flat arrays
const mapGround = new Array(MAP_W * MAP_H).fill(-1);
const mapObjects = new Array(MAP_W * MAP_H).fill(-1);
const mapForeground = new Array(MAP_W * MAP_H).fill(-1);

// Current layer to paint on
let activeLayer = 'ground';
const layers = { ground: mapGround, objects: mapObjects, foreground: mapForeground };
let selectedTile = -1;
let mode = 'paint'; // paint, erase, fill
let isPainting = false;
let brushW = 1, brushH = 1;

// ── Selection state ──
let selection = new Set(); // set of "x,y" strings
let selDragStart = null;   // {x,y} where drag started
let selDragging = false;
let savedGroups = [];      // [{name, tiles:[{dx,dy,tileId}]}]
const GROUPS_KEY = 'tile-painter-groups';

// ── Undo stack ──
const undoStack = [];
const MAX_UNDO = 50;

function pushUndo() {
  undoStack.push({
    ground: mapGround.slice(),
    objects: mapObjects.slice(),
    foreground: mapForeground.slice()
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const state = undoStack.pop();
  for (let i = 0; i < MAP_W * MAP_H; i++) {
    mapGround[i] = state.ground[i];
    mapObjects[i] = state.objects[i];
    mapForeground[i] = state.foreground[i];
  }
  renderMap();
  autoSave();
}

// ── Autosave ──
const AUTOSAVE_KEY = 'tile-painter-autosave';
let autoSaveTimer = null;

function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const data = { ground: mapGround.slice(), objects: mapObjects.slice(), foreground: mapForeground.slice(), w: MAP_W, h: MAP_H };
    try {
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
      document.getElementById('autoSaveStatus').textContent = 'saved';
      setTimeout(() => { document.getElementById('autoSaveStatus').textContent = ''; }, 1500);
    } catch(e) {}
  }, 500);
}

function loadAutoSave() {
  try {
    const saved = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if (saved && saved.ground && saved.ground.length === MAP_W * MAP_H) {
      for (let i = 0; i < MAP_W * MAP_H; i++) {
        mapGround[i] = saved.ground[i] ?? -1;
        mapObjects[i] = saved.objects?.[i] ?? -1;
        mapForeground[i] = saved.foreground?.[i] ?? -1;
      }
      return true;
    }
  } catch(e) {}
  return false;
}

function setTileZoom(level) {
  // level 1 = 4 cols (huge tiles), level 6 = 12 cols (small tiles)
  const cols = [4, 6, 8, 10, 12, 12][Math.max(0, Math.min(5, level - 1))];
  document.getElementById('tileGrid').style.setProperty('--tile-cols', cols);
}

function setBrush(w, h) {
  brushW = w; brushH = h;
  document.querySelectorAll('[id^="brush"]').forEach(b => b.classList.remove('active'));
  // Find matching button
  const id = w === 1 && h === 1 ? 'brush1' : w === 2 ? 'brush2' : w === 3 ? 'brush3' : w === 5 ? 'brush5' : w === MAP_W && h === 1 ? 'brushRow' : w === 1 && h === MAP_H ? 'brushCol' : w === MAP_W && h === MAP_H ? 'brushAll' : null;
  if (id) document.getElementById(id)?.classList.add('active');
  document.getElementById('brushInfo').textContent = w + '×' + h;
}

function setLayer(l) {
  activeLayer = l;
  document.getElementById('layerGround').className = l === 'ground' ? 'primary' : '';
  document.getElementById('layerObjects').className = l === 'objects' ? 'primary' : '';
  document.getElementById('layerForeground').className = l === 'foreground' ? 'primary' : '';
  renderMap();
}

// Load tileset
const tilesetImg = new Image();
tilesetImg.crossOrigin = 'anonymous';
tilesetImg.src = '/tilemap';

// Tile buffers cache
const tileCanvases = [];

tilesetImg.onload = async function() {
  buildTilePicker();
  // Try loading from server first, then autosave
  let loaded = false;
  try {
    const r = await fetch('/api/painted-map');
    if (r.ok) {
      const d = await r.json();
      if (d.ground && d.ground.length === MAP_W * MAP_H) {
        for (let i = 0; i < MAP_W * MAP_H; i++) {
          mapGround[i] = d.ground[i] ?? -1;
          mapObjects[i] = d.objects?.[i] ?? -1;
          mapForeground[i] = d.foreground?.[i] ?? -1;
        }
        loaded = true;
      }
    }
  } catch(e) {}
  if (!loaded) loadAutoSave();
  initMapCanvas();
  renderMap();
};

function buildTilePicker() {
  const grid = document.getElementById('tileGrid');
  grid.innerHTML = '';

  for (let id = 0; id < TOTAL_TILES; id++) {
    const cell = document.createElement('div');
    cell.className = 'tile-cell';
    cell.dataset.id = id;

    const c = document.createElement('canvas');
    c.width = TILE_SIZE;
    c.height = TILE_SIZE;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const col = id % COLS;
    const row = Math.floor(id / COLS);
    ctx.drawImage(tilesetImg, col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE, 0, 0, TILE_SIZE, TILE_SIZE);
    cell.appendChild(c);

    // Tiny ID label
    const label = document.createElement('div');
    label.className = 'tile-id';
    label.textContent = id;
    cell.appendChild(label);

    cell.addEventListener('click', () => selectTile(id));
    grid.appendChild(cell);

    // Cache the canvas for map rendering
    tileCanvases[id] = c;
  }
}

function selectTile(id) {
  selectedTile = id;
  mode = 'paint';
  document.getElementById('modePaint').classList.add('active');
  document.getElementById('modeErase').classList.remove('active');

  // Highlight in picker
  document.querySelectorAll('.tile-cell').forEach(c => c.classList.remove('selected'));
  const cell = document.querySelector(`.tile-cell[data-id="${id}"]`);
  if (cell) cell.classList.add('selected');

  // Update preview
  const prev = document.getElementById('selectedPreview');
  const ctx = prev.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 16, 16);
  const col = id % COLS;
  const row = Math.floor(id / COLS);
  ctx.drawImage(tilesetImg, col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE, 0, 0, TILE_SIZE, TILE_SIZE);
  document.getElementById('selectedLabel').textContent = 'Tile ' + id;
}

function setMode(m) {
  mode = m;
  document.getElementById('modePaint').classList.toggle('active', m === 'paint');
  document.getElementById('modeErase').classList.toggle('active', m === 'erase');
  document.getElementById('modeFill').classList.toggle('active', m === 'fill');
  document.getElementById('modeSelect').classList.toggle('active', m === 'select');
  document.getElementById('selectInfo').style.display = m === 'select' ? 'block' : 'none';
  if (m !== 'select') { selection.clear(); renderMap(); }
}

// ── Map Canvas ──────────────────────────────────────
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');

function initMapCanvas() {
  const area = document.getElementById('canvasArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;

  // Size canvas to fit the area while maintaining pixel-perfect tiles
  const scale = Math.min(Math.floor(areaW / (MAP_W * TILE_SIZE)), Math.floor(areaH / (MAP_H * TILE_SIZE)), 3) || 1;
  mapCanvas.width = MAP_W * TILE_SIZE * scale;
  mapCanvas.height = MAP_H * TILE_SIZE * scale;
  mapCanvas.style.width = mapCanvas.width + 'px';
  mapCanvas.style.height = mapCanvas.height + 'px';
  mapCtx.imageSmoothingEnabled = false;
  mapCanvas._scale = scale;
}

function renderMap() {
  const scale = mapCanvas._scale || 1;
  const w = MAP_W * TILE_SIZE * scale;
  const h = MAP_H * TILE_SIZE * scale;
  mapCtx.clearRect(0, 0, w, h);

  // Background
  mapCtx.fillStyle = '#1a1a2e';
  mapCtx.fillRect(0, 0, w, h);

  // Draw all 3 layers in order: ground → objects → foreground
  const layerOrder = ['ground', 'objects', 'foreground'];
  for (const layerName of layerOrder) {
    const layerData = layers[layerName];
    // Dim inactive layers slightly
    mapCtx.globalAlpha = (layerName === activeLayer) ? 1.0 : 0.5;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = layerData[y * MAP_W + x];
        if (t >= 0 && t < TOTAL_TILES) {
          const col = t % COLS;
          const row = Math.floor(t / COLS);
          mapCtx.drawImage(tilesetImg,
            col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE,
            x * TILE_SIZE * scale, y * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
        } else if (t >= 200 && tileCanvases[t]) {
          // Custom tile — draw from cached canvas
          mapCtx.drawImage(tileCanvases[t],
            0, 0, 16, 16,
            x * TILE_SIZE * scale, y * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
        }
      }
    }
  }
  mapCtx.globalAlpha = 1.0;

  // Grid lines
  mapCtx.strokeStyle = 'rgba(168, 85, 247, 0.08)';
  mapCtx.lineWidth = 1;
  for (let x = 0; x <= MAP_W; x++) {
    mapCtx.beginPath();
    mapCtx.moveTo(x * TILE_SIZE * scale, 0);
    mapCtx.lineTo(x * TILE_SIZE * scale, h);
    mapCtx.stroke();
  }
  for (let y = 0; y <= MAP_H; y++) {
    mapCtx.beginPath();
    mapCtx.moveTo(0, y * TILE_SIZE * scale);
    mapCtx.lineTo(w, y * TILE_SIZE * scale);
    mapCtx.stroke();
  }

  // Update tile count (all layers)
  let gCount = 0, oCount = 0, fCount = 0;
  for (let i = 0; i < MAP_W * MAP_H; i++) {
    if (mapGround[i] >= 0) gCount++;
    if (mapObjects[i] >= 0) oCount++;
    if (mapForeground[i] >= 0) fCount++;
  }
  document.getElementById('tileCount').textContent = 'G:' + gCount + ' O:' + oCount + ' F:' + fCount;

  // Draw selection highlights
  if (selection.size > 0) {
    mapCtx.strokeStyle = '#00ffff';
    mapCtx.lineWidth = 2;
    mapCtx.fillStyle = 'rgba(0, 255, 255, 0.15)';
    for (const key of selection) {
      const [sx, sy] = key.split(',').map(Number);
      mapCtx.fillRect(sx * TILE_SIZE * scale, sy * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
      mapCtx.strokeRect(sx * TILE_SIZE * scale, sy * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
    }
  }
}

function getCellFromEvent(e) {
  const rect = mapCanvas.getBoundingClientRect();
  const scale = mapCanvas._scale || 1;
  const x = Math.floor((e.clientX - rect.left) / (TILE_SIZE * scale));
  const y = Math.floor((e.clientY - rect.top) / (TILE_SIZE * scale));
  if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return null;
  return { x, y };
}

function paintCell(x, y) {
  // Check for pending group placement
  if (window._pendingGroup) {
    pushUndo();
    const g = window._pendingGroup;
    const targetLayer = layers[g.layer || activeLayer];
    for (const t of g.tiles) {
      const px = x + t.dx, py = y + t.dy;
      if (px >= 0 && px < MAP_W && py >= 0 && py < MAP_H) {
        targetLayer[py * MAP_W + px] = t.tile;
      }
    }
    window._pendingGroup = null;
    renderMap(); autoSave();
    return;
  }
  const layer = layers[activeLayer];

  if (mode === 'fill') {
    // Flood fill from (x,y) with selected tile
    const targetTile = layer[y * MAP_W + x];
    if (targetTile === selectedTile) return;
    const stack = [{ x, y }];
    const visited = new Set();
    while (stack.length > 0) {
      const { x: cx, y: cy } = stack.pop();
      if (cx < 0 || cx >= MAP_W || cy < 0 || cy >= MAP_H) continue;
      const key = cy * MAP_W + cx;
      if (visited.has(key)) continue;
      if (layer[key] !== targetTile) continue;
      visited.add(key);
      layer[key] = selectedTile >= 0 ? selectedTile : -1;
      stack.push({ x: cx + 1, y: cy }, { x: cx - 1, y: cy }, { x: cx, y: cy + 1 }, { x: cx, y: cy - 1 });
    }
    renderMap();
    return;
  }

  // Brush: paint a rectangle centered on (x,y)
  const halfW = Math.floor(brushW / 2);
  const halfH = Math.floor(brushH / 2);
  for (let dy = -halfH; dy < brushH - halfH; dy++) {
    for (let dx = -halfW; dx < brushW - halfW; dx++) {
      const px = x + dx, py = y + dy;
      if (px < 0 || px >= MAP_W || py < 0 || py >= MAP_H) continue;
      const idx = py * MAP_W + px;
      if (mode === 'erase') {
        layer[idx] = -1;
      } else if (selectedTile >= 0) {
        layer[idx] = selectedTile;
      }
    }
  }
  renderMap();
}

mapCanvas.addEventListener('mousedown', (e) => {
  const cell = getCellFromEvent(e);
  if (!cell) return;

  if (mode === 'select') {
    const key = cell.x + ',' + cell.y;
    if (e.shiftKey) {
      // Shift+click: toggle cell in selection
      if (selection.has(key)) selection.delete(key);
      else selection.add(key);
    } else if (selection.has(key)) {
      // Click on selected cell: start dragging
      selDragStart = { x: cell.x, y: cell.y };
      selDragging = true;
      pushUndo();
    } else {
      // Click on unselected: start new selection
      selection.clear();
      selection.add(key);
    }
    updateSelectionUI();
    renderMap();
    return;
  }

  pushUndo();
  isPainting = true;
  paintCell(cell.x, cell.y);
});

mapCanvas.addEventListener('mousemove', (e) => {
  const cell = getCellFromEvent(e);
  if (!cell) return;

  if (mode === 'select' && selDragging && selDragStart) {
    // Preview drag destination (just update cursor)
    return;
  }
  if (mode === 'select' && isPainting) {
    // Shift+drag to add to selection
    if (e.shiftKey) {
      selection.add(cell.x + ',' + cell.y);
      updateSelectionUI();
      renderMap();
    }
    return;
  }
  if (!isPainting) return;
  paintCell(cell.x, cell.y);
});

mapCanvas.addEventListener('mouseup', (e) => {
  if (mode === 'select' && selDragging && selDragStart) {
    const cell = getCellFromEvent(e);
    if (cell) {
      const dx = cell.x - selDragStart.x;
      const dy = cell.y - selDragStart.y;
      if (dx !== 0 || dy !== 0) moveSelectionBy(dx, dy);
    }
    selDragging = false;
    selDragStart = null;
    autoSave();
    renderMap();
    return;
  }
  isPainting = false;
  autoSave();
});
mapCanvas.addEventListener('mouseleave', () => { isPainting = false; selDragging = false; });

// Right-click to erase
mapCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if (cell) {
    pushUndo();
    layers[activeLayer][cell.y * MAP_W + cell.x] = -1;
    renderMap();
    autoSave();
  }
});

// ── Actions ─────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear entire map (all layers)?')) return;
  mapGround.fill(-1);
  mapObjects.fill(-1);
  mapForeground.fill(-1);
  renderMap();
  showToast('Map cleared');
}

function exportMap() {
  const data = {
    width: MAP_W, height: MAP_H,
    ground: mapGround.slice(),
    objects: mapObjects.slice(),
    foreground: mapForeground.slice()
  };
  // Save to server
  fetch('/api/painted-map', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(r => r.json()).then(d => {
    showToast('Map saved to server');
  }).catch(() => {
    // Fallback: download as file
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'painted-map.json';
    a.click();
    showToast('Map downloaded as JSON');
  });
}

function downloadPng() {
  // Render at 1x scale for clean PNG
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = MAP_W * TILE_SIZE;
  tmpCanvas.height = MAP_H * TILE_SIZE;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.imageSmoothingEnabled = false;
  // Render all 3 layers
  for (const layerName of ['ground', 'objects', 'foreground']) {
    const layerData = layers[layerName];
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = layerData[y * MAP_W + x];
        if (t >= 0 && t < TOTAL_TILES) {
          const col = t % COLS;
          const row = Math.floor(t / COLS);
          tmpCtx.drawImage(tilesetImg,
            col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE,
            x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        } else if (t >= 200 && tileCanvases[t]) {
          tmpCtx.drawImage(tileCanvases[t], 0, 0, 16, 16, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
      }
    }
  }
  const a = document.createElement('a');
  a.href = tmpCanvas.toDataURL('image/png');
  a.download = 'painted-map.png';
  a.click();
  showToast('PNG downloaded');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Keyboard: E for erase, P for paint, Delete/Backspace for clear cell
// ── Selection functions ──
function updateSelectionUI() {
  document.getElementById('selectCount').textContent = selection.size;
}

function clearSelection() {
  selection.clear();
  updateSelectionUI();
  renderMap();
}

function deleteSelection() {
  if (selection.size === 0) return;
  pushUndo();
  const layer = layers[activeLayer];
  for (const key of selection) {
    const [x, y] = key.split(',').map(Number);
    layer[y * MAP_W + x] = -1;
  }
  selection.clear();
  updateSelectionUI();
  renderMap();
  autoSave();
}

function moveSelectionBy(dx, dy) {
  const layer = layers[activeLayer];
  // Collect tiles to move
  const tiles = [];
  for (const key of selection) {
    const [x, y] = key.split(',').map(Number);
    tiles.push({ x, y, tile: layer[y * MAP_W + x] });
  }
  // Clear old positions
  for (const t of tiles) {
    layer[t.y * MAP_W + t.x] = -1;
  }
  // Place at new positions
  const newSelection = new Set();
  for (const t of tiles) {
    const nx = t.x + dx, ny = t.y + dy;
    if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
      layer[ny * MAP_W + nx] = t.tile;
      newSelection.add(nx + ',' + ny);
    }
  }
  selection = newSelection;
  updateSelectionUI();
  autoSave();
}

function moveSelection() {
  // Toggle into drag mode — next click+drag on selection moves it
  if (selection.size === 0) return;
  showToast('Click and drag selected tiles to move them');
}

function saveGroup() {
  if (selection.size === 0) return;
  const layer = layers[activeLayer];
  // Find bounding box
  let minX = MAP_W, minY = MAP_H, maxX = 0, maxY = 0;
  for (const key of selection) {
    const [x, y] = key.split(',').map(Number);
    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
  }
  const tiles = [];
  for (const key of selection) {
    const [x, y] = key.split(',').map(Number);
    const t = layer[y * MAP_W + x];
    if (t >= 0) tiles.push({ dx: x - minX, dy: y - minY, tile: t });
  }
  if (tiles.length === 0) return;
  const name = prompt('Group name:', 'group-' + (savedGroups.length + 1));
  if (!name) return;
  savedGroups.push({ name, w: maxX - minX + 1, h: maxY - minY + 1, layer: activeLayer, tiles });
  try { localStorage.setItem(GROUPS_KEY, JSON.stringify(savedGroups)); } catch(e) {}
  updateGroupsUI();
  showToast('Group "' + name + '" saved (' + tiles.length + ' tiles)');
}

function placeGroup(idx) {
  const group = savedGroups[idx];
  if (!group) return;
  setMode('paint');
  // Set a special mode that stamps the group on click
  window._pendingGroup = group;
  showToast('Click on map to place "' + group.name + '"');
}

function updateGroupsUI() {
  const el = document.getElementById('savedGroups');
  if (savedGroups.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:8px;color:#555;margin-bottom:2px;">Saved Groups:</div>' +
    savedGroups.map((g, i) => '<button class="mode-btn" onclick="placeGroup(' + i + ')" style="font-size:8px;padding:1px 4px;margin:1px;">' + g.name + ' (' + g.tiles.length + ')</button>').join('');
}

// Load saved groups
try { savedGroups = JSON.parse(localStorage.getItem(GROUPS_KEY)) || []; } catch(e) { savedGroups = []; }
updateGroupsUI();

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (e.key === 'e' || e.key === 'E') setMode('erase');
  if (e.key === 'p' || e.key === 'P') setMode('paint');
  if (e.key === 'f' || e.key === 'F') setMode('fill');
  if (e.key === 's' && !e.ctrlKey) setMode('select');
  if (e.key === 'Delete' && mode === 'select') deleteSelection();
  if (e.key === '1') setLayer('ground');
  if (e.key === '2') setLayer('objects');
  if (e.key === '3') setLayer('foreground');
  if (e.key === '[') setBrush(Math.max(1, brushW - 1), Math.max(1, brushH - 1));
  if (e.key === ']') setBrush(Math.min(MAP_W, brushW + 1), Math.min(MAP_H, brushH + 1));
});

// ── Custom tile from reference image ──
(function() {
  var refImg = document.getElementById('refImg');
  var refCanvas = document.getElementById('refCanvas');
  var refCtx = refCanvas.getContext('2d');
  var dragStart = null;
  var dragEnd = null;
  var customTileId = 200; // custom tiles start at ID 200

  function resizeRefCanvas() {
    var rect = refImg.getBoundingClientRect();
    refCanvas.width = rect.width;
    refCanvas.height = rect.height;
  }

  refImg.onload = resizeRefCanvas;
  window.addEventListener('resize', resizeRefCanvas);
  setTimeout(resizeRefCanvas, 1000);

  refCanvas.addEventListener('mousedown', function(e) {
    if (e.shiftKey) return; // shift = resize panel
    var rect = refCanvas.getBoundingClientRect();
    dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    dragEnd = null;
    e.preventDefault();
    e.stopPropagation();
  });

  refCanvas.addEventListener('mousemove', function(e) {
    if (!dragStart) return;
    var rect = refCanvas.getBoundingClientRect();
    dragEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    // Draw selection rectangle
    refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);
    refCtx.strokeStyle = '#ff00ff';
    refCtx.lineWidth = 2;
    refCtx.setLineDash([4, 4]);
    var x = Math.min(dragStart.x, dragEnd.x);
    var y = Math.min(dragStart.y, dragEnd.y);
    var w = Math.abs(dragEnd.x - dragStart.x);
    var h = Math.abs(dragEnd.y - dragStart.y);
    refCtx.strokeRect(x, y, w, h);
    refCtx.setLineDash([]);
    refCtx.fillStyle = 'rgba(255, 0, 255, 0.1)';
    refCtx.fillRect(x, y, w, h);
    e.preventDefault();
    e.stopPropagation();
  });

  refCanvas.addEventListener('mouseup', function(e) {
    if (!dragStart || !dragEnd) { dragStart = null; return; }

    // Calculate selection in image pixel coordinates
    var imgRect = refImg.getBoundingClientRect();
    var canvasRect = refCanvas.getBoundingClientRect();
    // The image might be padded inside the container
    var imgDisplay = { x: imgRect.left - canvasRect.left, y: imgRect.top - canvasRect.top, w: imgRect.width, h: imgRect.height };
    var imgNatW = refImg.naturalWidth || 918;
    var imgNatH = refImg.naturalHeight || 515;
    var scaleX = imgNatW / imgDisplay.w;
    var scaleY = imgNatH / imgDisplay.h;

    var x1 = Math.round((Math.min(dragStart.x, dragEnd.x) - imgDisplay.x) * scaleX);
    var y1 = Math.round((Math.min(dragStart.y, dragEnd.y) - imgDisplay.y) * scaleY);
    var x2 = Math.round((Math.max(dragStart.x, dragEnd.x) - imgDisplay.x) * scaleX);
    var y2 = Math.round((Math.max(dragStart.y, dragEnd.y) - imgDisplay.y) * scaleY);

    x1 = Math.max(0, x1); y1 = Math.max(0, y1);
    x2 = Math.min(imgNatW, x2); y2 = Math.min(imgNatH, y2);
    var w = x2 - x1, h = y2 - y1;
    if (w < 4 || h < 4) { dragStart = null; refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height); return; }

    // Extract pixels from the reference image onto a temp canvas
    var tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = imgNatW;
    tmpCanvas.height = imgNatH;
    var tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.drawImage(refImg, 0, 0);

    // Create a 16x16 tile from the selected region (resize to 16x16)
    var tileCanvas = document.createElement('canvas');
    tileCanvas.width = 16;
    tileCanvas.height = 16;
    var tileCtx = tileCanvas.getContext('2d');
    tileCtx.imageSmoothingEnabled = false;
    tileCtx.drawImage(tmpCanvas, x1, y1, w, h, 0, 0, 16, 16);

    // Add as a custom tile
    var id = customTileId++;

    // Store the tile image data for painting on ANY layer
    tileCanvases[id] = tileCanvas;

    // Create display cell matching standard tile-cell style
    var cell = document.createElement('div');
    cell.style.cssText = 'width:44px; height:44px; cursor:pointer; border:2px solid transparent; border-radius:3px; position:relative; display:inline-block; background:#0a0a1a;';
    var displayCanvas = document.createElement('canvas');
    displayCanvas.width = 16;
    displayCanvas.height = 16;
    displayCanvas.getContext('2d').drawImage(tileCanvas, 0, 0);
    displayCanvas.style.cssText = 'width:100%; height:100%; image-rendering:pixelated;';
    cell.appendChild(displayCanvas);
    var label = document.createElement('div');
    label.style.cssText = 'position:absolute; bottom:0; right:1px; font-size:7px; color:#a855f7;';
    label.textContent = id;
    cell.appendChild(label);
    cell.title = 'Custom #' + id + ' — click to select, × to delete';
    cell.dataset.customId = id;

    // Delete button
    var delBtn = document.createElement('div');
    delBtn.style.cssText = 'position:absolute; top:-2px; left:-2px; width:12px; height:12px; background:#ef4444; color:#fff; font-size:8px; line-height:12px; text-align:center; border-radius:50%; cursor:pointer; display:none; z-index:1;';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', function(evt) {
      evt.stopPropagation();
      // Remove from map data (replace all instances of this ID with -1)
      for (var i = 0; i < MAP_W * MAP_H; i++) {
        if (mapGround[i] === id) mapGround[i] = -1;
        if (mapObjects[i] === id) mapObjects[i] = -1;
        if (mapForeground[i] === id) mapForeground[i] = -1;
      }
      delete tileCanvases[id];
      cell.remove();
      if (selectedTile === id) { selectedTile = -1; document.getElementById('selectedLabel').textContent = 'None'; }
      renderMap();
      autoSave();
      showToast('Custom tile #' + id + ' deleted');
    });
    cell.appendChild(delBtn);
    cell.addEventListener('mouseenter', function() { delBtn.style.display = 'block'; });
    cell.addEventListener('mouseleave', function() { delBtn.style.display = 'none'; });

    cell.addEventListener('click', function() {
      selectedTile = id;
      setMode('paint');
      // Clear all highlights
      document.querySelectorAll('.tile-cell').forEach(function(c) { c.classList.remove('selected'); });
      document.querySelectorAll('#customTiles > div').forEach(function(c) { c.style.borderColor = 'transparent'; });
      cell.style.borderColor = '#a855f7';
      cell.style.boxShadow = '0 0 6px #a855f7';
      document.getElementById('selectedLabel').textContent = 'Custom #' + id;
      var prev = document.getElementById('selectedPreview');
      prev.getContext('2d').drawImage(tileCanvas, 0, 0);
    });

    document.getElementById('customTiles').appendChild(cell);

    // Keep selection visible so user can adjust and re-save
    // Don't clear dragStart/dragEnd — let user see what they grabbed
    showToast('Custom tile #' + id + ' created — adjust selection & drag again for another');
    e.preventDefault();
    e.stopPropagation();
  });
})();

// Resize handler
window.addEventListener('resize', () => { initMapCanvas(); renderMap(); });

// ── Drag-to-resize: tile panel (horizontal) and reference (vertical) ──
(function() {
  // Tile panel: drag right edge to resize width
  var tilePanel = document.getElementById('tilePanel');
  var tpDrag = false, tpStartX = 0, tpStartW = 0;
  tilePanel.addEventListener('mousedown', function(e) {
    // Only trigger on the right edge (last 6px)
    var rect = tilePanel.getBoundingClientRect();
    if (e.clientX > rect.right - 6) {
      tpDrag = true; tpStartX = e.clientX; tpStartW = rect.width;
      e.preventDefault();
    }
  });
  // Reference area: drag top edge to resize height
  var refArea = document.getElementById('refArea');
  var refDrag = false, refStartY = 0, refStartH = 0;
  refArea.addEventListener('mousedown', function(e) {
    // Only trigger on the top edge (first 6px)
    var rect = refArea.getBoundingClientRect();
    if (e.clientY < rect.top + 6) {
      refDrag = true; refStartY = e.clientY; refStartH = rect.height;
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (tpDrag) {
      var newW = tpStartW + (e.clientX - tpStartX);
      tilePanel.style.width = Math.max(150, Math.min(600, newW)) + 'px';
      initMapCanvas(); renderMap();
    }
    if (refDrag) {
      var newH = refStartH - (e.clientY - refStartY);
      refArea.style.height = Math.max(80, Math.min(500, newH)) + 'px';
      initMapCanvas(); renderMap();
    }
  });
  document.addEventListener('mouseup', function() { tpDrag = false; refDrag = false; });
})();
</script>
