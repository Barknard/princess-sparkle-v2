<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Painter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .main-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  .ref-area { display: flex; overflow: hidden; background: #141428; border-top: 2px solid #a855f733; cursor: ns-resize; }

  .header { grid-area: header; background: #141428; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
  .header h1 { font-size: 14px; font-weight: 700; color: #a855f7; }
  .header a { color: #888; text-decoration: none; font-size: 11px; }
  .header a:hover { color: #a855f7; }
  .header .spacer { flex: 1; }
  .header button { background: #2a2a3e; color: #e0e0e0; border: 1px solid #3a3a5e; border-radius: 4px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
  .header button:hover { background: #3a3a5e; }
  .header button.danger { border-color: #ef4444; color: #ef4444; }
  .header button.danger:hover { background: #2a1010; }
  .header button.primary { background: #a855f7; color: #fff; border-color: #a855f7; }
  .header .info { font-size: 11px; color: #888; }

  .tile-panel { background: #141428; border-right: 2px solid #a855f733; display: flex; flex-direction: column; overflow: hidden; width: 280px; min-width: 150px; max-width: 600px; cursor: ew-resize; }
  .tile-panel-header { padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; border-bottom: 1px solid #2a2a3e; }
  .tile-grid-wrap { flex: 1; overflow: hidden; padding: 4px; }
  .tile-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; height: 100%; }
  .tile-cell { cursor: pointer; border: 1px solid transparent; border-radius: 1px; image-rendering: pixelated; position: relative; overflow: hidden; }
  .tile-cell:hover { border-color: #a855f788; }
  .tile-cell.selected { border-color: #a855f7; box-shadow: 0 0 6px #a855f7; }
  .tile-cell canvas { width: 100%; height: 100%; image-rendering: pixelated; }
  .tile-cell .tile-id { position: absolute; bottom: 0; right: 1px; font-size: 7px; color: #888; }

  .selected-tile { padding: 8px 10px; border-top: 1px solid #2a2a3e; font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 8px; }
  .selected-tile canvas { width: 32px; height: 32px; image-rendering: pixelated; border: 1px solid #a855f7; }
  .mode-toggle { padding: 6px 10px; border-top: 1px solid #2a2a3e; display: flex; gap: 6px; }
  .mode-btn { flex: 1; padding: 4px; font-size: 10px; border: 1px solid #2a2a3e; background: #0a0a1a; color: #888; border-radius: 4px; cursor: pointer; text-align: center; }
  .mode-btn.active { background: #a855f7; color: #fff; border-color: #a855f7; }

  .canvas-area { flex: 1; position: relative; overflow: hidden; background: #0a0a1a; min-width: 0; }
  .canvas-area canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 8px 20px; border-radius: 6px; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>Tile Painter</h1>
  <a href="/">← Dashboard</a>
  <a href="/annotate">Annotator</a>
  <div class="spacer"></div>
  <span class="info" id="gridInfo">24 × 14 tiles</span>
  <span class="info" id="tileCount">Placed: 0</span>
  <span class="info">Layer:</span>
  <button id="layerGround" class="primary" onclick="setLayer('ground')">Ground</button>
  <button id="layerObjects" onclick="setLayer('objects')">Objects</button>
  <button id="layerForeground" onclick="setLayer('foreground')">Foreground</button>
  <button onclick="undo()" title="Ctrl+Z">Undo</button>
  <button onclick="exportMap()">Export</button>
  <button onclick="downloadPng()">PNG</button>
  <button class="danger" onclick="clearAll()">Clear All</button>
  <span class="info" id="autoSaveStatus" style="color:#22c55e;font-size:9px;"></span>
</div>

<div class="main-area">
<div class="tile-panel" id="tilePanel">
  <div class="tile-panel-header" style="display:flex; justify-content:space-between; align-items:center;">
    <span>Tileset</span>
    <label style="font-size:9px; color:#888; text-transform:none; letter-spacing:0;">
      Zoom: <input type="range" id="tileZoom" min="1" max="6" value="3" style="width:60px; vertical-align:middle;" oninput="setTileZoom(this.value)">
    </label>
  </div>
  <div class="tile-grid-wrap">
    <div class="tile-grid" id="tileGrid"></div>
  </div>
  <div class="selected-tile">
    <canvas id="selectedPreview" width="16" height="16"></canvas>
    <span id="selectedLabel">None selected</span>
  </div>
  <div class="mode-toggle">
    <div class="mode-btn active" id="modePaint" onclick="setMode('paint')">Paint</div>
    <div class="mode-btn" id="modeErase" onclick="setMode('erase')">Erase</div>
    <div class="mode-btn" id="modeFill" onclick="setMode('fill')">Fill</div>
  </div>
  <div style="padding:6px 10px; border-top:1px solid #2a2a3e;">
    <div style="font-size:9px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Brush</div>
    <div style="display:flex; gap:4px; align-items:center; flex-wrap:wrap;">
      <button class="mode-btn active" id="brush1" onclick="setBrush(1,1)" style="flex:none;width:24px;padding:2px;">1×1</button>
      <button class="mode-btn" id="brush2" onclick="setBrush(2,2)" style="flex:none;width:24px;padding:2px;">2×2</button>
      <button class="mode-btn" id="brush3" onclick="setBrush(3,3)" style="flex:none;width:24px;padding:2px;">3×3</button>
      <button class="mode-btn" id="brush5" onclick="setBrush(5,5)" style="flex:none;width:24px;padding:2px;">5×5</button>
      <button class="mode-btn" id="brushRow" onclick="setBrush(24,1)" style="flex:none;padding:2px;">Row</button>
      <button class="mode-btn" id="brushCol" onclick="setBrush(1,14)" style="flex:none;padding:2px;">Col</button>
      <button class="mode-btn" id="brushAll" onclick="setBrush(24,14)" style="flex:none;padding:2px;">All</button>
    </div>
    <div style="font-size:9px; color:#555; margin-top:3px;" id="brushInfo">1×1</div>
  </div>
</div>

<div class="canvas-area" id="canvasArea">
  <canvas id="mapCanvas"></canvas>
</div>
</div><!-- end main-area -->

<div class="ref-area" id="refArea" style="height:200px;">
  <div style="font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666; writing-mode:vertical-lr; transform:rotate(180deg); padding:4px;">Reference</div>
  <img src="/reference" style="height:100%; object-fit:contain; image-rendering:pixelated; padding:4px;">
</div>

<div class="toast" id="toast"></div>

<script>
const TILE_SIZE = 16;
const COLS = 12;
const ROWS = 11;
const TOTAL_TILES = 132;
const MAP_W = 24;
const MAP_H = 14;

// Map data: 3 flat arrays
const mapGround = new Array(MAP_W * MAP_H).fill(-1);
const mapObjects = new Array(MAP_W * MAP_H).fill(-1);
const mapForeground = new Array(MAP_W * MAP_H).fill(-1);

// Current layer to paint on
let activeLayer = 'ground';
const layers = { ground: mapGround, objects: mapObjects, foreground: mapForeground };
let selectedTile = -1;
let mode = 'paint'; // paint, erase, fill
let isPainting = false;
let brushW = 1, brushH = 1;

// ── Undo stack ──
const undoStack = [];
const MAX_UNDO = 50;

function pushUndo() {
  undoStack.push({
    ground: mapGround.slice(),
    objects: mapObjects.slice(),
    foreground: mapForeground.slice()
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const state = undoStack.pop();
  for (let i = 0; i < MAP_W * MAP_H; i++) {
    mapGround[i] = state.ground[i];
    mapObjects[i] = state.objects[i];
    mapForeground[i] = state.foreground[i];
  }
  renderMap();
  autoSave();
}

// ── Autosave ──
const AUTOSAVE_KEY = 'tile-painter-autosave';
let autoSaveTimer = null;

function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const data = { ground: mapGround.slice(), objects: mapObjects.slice(), foreground: mapForeground.slice(), w: MAP_W, h: MAP_H };
    try {
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
      document.getElementById('autoSaveStatus').textContent = 'saved';
      setTimeout(() => { document.getElementById('autoSaveStatus').textContent = ''; }, 1500);
    } catch(e) {}
  }, 500);
}

function loadAutoSave() {
  try {
    const saved = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if (saved && saved.ground && saved.ground.length === MAP_W * MAP_H) {
      for (let i = 0; i < MAP_W * MAP_H; i++) {
        mapGround[i] = saved.ground[i] ?? -1;
        mapObjects[i] = saved.objects?.[i] ?? -1;
        mapForeground[i] = saved.foreground?.[i] ?? -1;
      }
      return true;
    }
  } catch(e) {}
  return false;
}

function setTileZoom(level) {
  // level 1 = 4 cols (huge tiles), level 6 = 12 cols (small tiles)
  const cols = [4, 6, 8, 10, 12, 12][Math.max(0, Math.min(5, level - 1))];
  document.getElementById('tileGrid').style.setProperty('--tile-cols', cols);
}

function setBrush(w, h) {
  brushW = w; brushH = h;
  document.querySelectorAll('[id^="brush"]').forEach(b => b.classList.remove('active'));
  // Find matching button
  const id = w === 1 && h === 1 ? 'brush1' : w === 2 ? 'brush2' : w === 3 ? 'brush3' : w === 5 ? 'brush5' : w === MAP_W && h === 1 ? 'brushRow' : w === 1 && h === MAP_H ? 'brushCol' : w === MAP_W && h === MAP_H ? 'brushAll' : null;
  if (id) document.getElementById(id)?.classList.add('active');
  document.getElementById('brushInfo').textContent = w + '×' + h;
}

function setLayer(l) {
  activeLayer = l;
  document.getElementById('layerGround').className = l === 'ground' ? 'primary' : '';
  document.getElementById('layerObjects').className = l === 'objects' ? 'primary' : '';
  document.getElementById('layerForeground').className = l === 'foreground' ? 'primary' : '';
  renderMap();
}

// Load tileset
const tilesetImg = new Image();
tilesetImg.crossOrigin = 'anonymous';
tilesetImg.src = '/tilemap';

// Tile buffers cache
const tileCanvases = [];

tilesetImg.onload = async function() {
  buildTilePicker();
  // Try loading from server first, then autosave
  let loaded = false;
  try {
    const r = await fetch('/api/painted-map');
    if (r.ok) {
      const d = await r.json();
      if (d.ground && d.ground.length === MAP_W * MAP_H) {
        for (let i = 0; i < MAP_W * MAP_H; i++) {
          mapGround[i] = d.ground[i] ?? -1;
          mapObjects[i] = d.objects?.[i] ?? -1;
          mapForeground[i] = d.foreground?.[i] ?? -1;
        }
        loaded = true;
      }
    }
  } catch(e) {}
  if (!loaded) loadAutoSave();
  initMapCanvas();
  renderMap();
};

function buildTilePicker() {
  const grid = document.getElementById('tileGrid');
  grid.innerHTML = '';

  for (let id = 0; id < TOTAL_TILES; id++) {
    const cell = document.createElement('div');
    cell.className = 'tile-cell';
    cell.dataset.id = id;

    const c = document.createElement('canvas');
    c.width = TILE_SIZE;
    c.height = TILE_SIZE;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const col = id % COLS;
    const row = Math.floor(id / COLS);
    ctx.drawImage(tilesetImg, col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE, 0, 0, TILE_SIZE, TILE_SIZE);
    cell.appendChild(c);

    // Tiny ID label
    const label = document.createElement('div');
    label.className = 'tile-id';
    label.textContent = id;
    cell.appendChild(label);

    cell.addEventListener('click', () => selectTile(id));
    grid.appendChild(cell);

    // Cache the canvas for map rendering
    tileCanvases[id] = c;
  }
}

function selectTile(id) {
  selectedTile = id;
  mode = 'paint';
  document.getElementById('modePaint').classList.add('active');
  document.getElementById('modeErase').classList.remove('active');

  // Highlight in picker
  document.querySelectorAll('.tile-cell').forEach(c => c.classList.remove('selected'));
  const cell = document.querySelector(`.tile-cell[data-id="${id}"]`);
  if (cell) cell.classList.add('selected');

  // Update preview
  const prev = document.getElementById('selectedPreview');
  const ctx = prev.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 16, 16);
  const col = id % COLS;
  const row = Math.floor(id / COLS);
  ctx.drawImage(tilesetImg, col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE, 0, 0, TILE_SIZE, TILE_SIZE);
  document.getElementById('selectedLabel').textContent = 'Tile ' + id;
}

function setMode(m) {
  mode = m;
  document.getElementById('modePaint').classList.toggle('active', m === 'paint');
  document.getElementById('modeErase').classList.toggle('active', m === 'erase');
  document.getElementById('modeFill').classList.toggle('active', m === 'fill');
}

// ── Map Canvas ──────────────────────────────────────
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');

function initMapCanvas() {
  const area = document.getElementById('canvasArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;

  // Size canvas to fit the area while maintaining pixel-perfect tiles
  const scale = Math.min(Math.floor(areaW / (MAP_W * TILE_SIZE)), Math.floor(areaH / (MAP_H * TILE_SIZE)), 3) || 1;
  mapCanvas.width = MAP_W * TILE_SIZE * scale;
  mapCanvas.height = MAP_H * TILE_SIZE * scale;
  mapCanvas.style.width = mapCanvas.width + 'px';
  mapCanvas.style.height = mapCanvas.height + 'px';
  mapCtx.imageSmoothingEnabled = false;
  mapCanvas._scale = scale;
}

function renderMap() {
  const scale = mapCanvas._scale || 1;
  const w = MAP_W * TILE_SIZE * scale;
  const h = MAP_H * TILE_SIZE * scale;
  mapCtx.clearRect(0, 0, w, h);

  // Background
  mapCtx.fillStyle = '#1a1a2e';
  mapCtx.fillRect(0, 0, w, h);

  // Draw all 3 layers in order: ground → objects → foreground
  const layerOrder = ['ground', 'objects', 'foreground'];
  for (const layerName of layerOrder) {
    const layerData = layers[layerName];
    // Dim inactive layers slightly
    mapCtx.globalAlpha = (layerName === activeLayer) ? 1.0 : 0.5;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = layerData[y * MAP_W + x];
        if (t >= 0 && t < TOTAL_TILES) {
          const col = t % COLS;
          const row = Math.floor(t / COLS);
          mapCtx.drawImage(tilesetImg,
            col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE,
            x * TILE_SIZE * scale, y * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
        }
      }
    }
  }
  mapCtx.globalAlpha = 1.0;

  // Grid lines
  mapCtx.strokeStyle = 'rgba(168, 85, 247, 0.08)';
  mapCtx.lineWidth = 1;
  for (let x = 0; x <= MAP_W; x++) {
    mapCtx.beginPath();
    mapCtx.moveTo(x * TILE_SIZE * scale, 0);
    mapCtx.lineTo(x * TILE_SIZE * scale, h);
    mapCtx.stroke();
  }
  for (let y = 0; y <= MAP_H; y++) {
    mapCtx.beginPath();
    mapCtx.moveTo(0, y * TILE_SIZE * scale);
    mapCtx.lineTo(w, y * TILE_SIZE * scale);
    mapCtx.stroke();
  }

  // Update tile count (all layers)
  let gCount = 0, oCount = 0, fCount = 0;
  for (let i = 0; i < MAP_W * MAP_H; i++) {
    if (mapGround[i] >= 0) gCount++;
    if (mapObjects[i] >= 0) oCount++;
    if (mapForeground[i] >= 0) fCount++;
  }
  document.getElementById('tileCount').textContent = 'G:' + gCount + ' O:' + oCount + ' F:' + fCount;
}

function getCellFromEvent(e) {
  const rect = mapCanvas.getBoundingClientRect();
  const scale = mapCanvas._scale || 1;
  const x = Math.floor((e.clientX - rect.left) / (TILE_SIZE * scale));
  const y = Math.floor((e.clientY - rect.top) / (TILE_SIZE * scale));
  if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return null;
  return { x, y };
}

function paintCell(x, y) {
  const layer = layers[activeLayer];

  if (mode === 'fill') {
    // Flood fill from (x,y) with selected tile
    const targetTile = layer[y * MAP_W + x];
    if (targetTile === selectedTile) return;
    const stack = [{ x, y }];
    const visited = new Set();
    while (stack.length > 0) {
      const { x: cx, y: cy } = stack.pop();
      if (cx < 0 || cx >= MAP_W || cy < 0 || cy >= MAP_H) continue;
      const key = cy * MAP_W + cx;
      if (visited.has(key)) continue;
      if (layer[key] !== targetTile) continue;
      visited.add(key);
      layer[key] = selectedTile >= 0 ? selectedTile : -1;
      stack.push({ x: cx + 1, y: cy }, { x: cx - 1, y: cy }, { x: cx, y: cy + 1 }, { x: cx, y: cy - 1 });
    }
    renderMap();
    return;
  }

  // Brush: paint a rectangle centered on (x,y)
  const halfW = Math.floor(brushW / 2);
  const halfH = Math.floor(brushH / 2);
  for (let dy = -halfH; dy < brushH - halfH; dy++) {
    for (let dx = -halfW; dx < brushW - halfW; dx++) {
      const px = x + dx, py = y + dy;
      if (px < 0 || px >= MAP_W || py < 0 || py >= MAP_H) continue;
      const idx = py * MAP_W + px;
      if (mode === 'erase') {
        layer[idx] = -1;
      } else if (selectedTile >= 0) {
        layer[idx] = selectedTile;
      }
    }
  }
  renderMap();
}

mapCanvas.addEventListener('mousedown', (e) => {
  pushUndo();
  isPainting = 'started';
  const cell = getCellFromEvent(e);
  if (cell) paintCell(cell.x, cell.y);
});

mapCanvas.addEventListener('mousemove', (e) => {
  if (!isPainting) return;
  const cell = getCellFromEvent(e);
  if (cell) paintCell(cell.x, cell.y);
});

mapCanvas.addEventListener('mouseup', () => { isPainting = false; autoSave(); });
mapCanvas.addEventListener('mouseleave', () => { isPainting = false; });

// Right-click to erase
mapCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if (cell) {
    pushUndo();
    layers[activeLayer][cell.y * MAP_W + cell.x] = -1;
    renderMap();
    autoSave();
  }
});

// ── Actions ─────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear entire map (all layers)?')) return;
  mapGround.fill(-1);
  mapObjects.fill(-1);
  mapForeground.fill(-1);
  renderMap();
  showToast('Map cleared');
}

function exportMap() {
  const data = {
    width: MAP_W, height: MAP_H,
    ground: mapGround.slice(),
    objects: mapObjects.slice(),
    foreground: mapForeground.slice()
  };
  // Save to server
  fetch('/api/painted-map', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(r => r.json()).then(d => {
    showToast('Map saved to server');
  }).catch(() => {
    // Fallback: download as file
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'painted-map.json';
    a.click();
    showToast('Map downloaded as JSON');
  });
}

function downloadPng() {
  // Render at 1x scale for clean PNG
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = MAP_W * TILE_SIZE;
  tmpCanvas.height = MAP_H * TILE_SIZE;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.imageSmoothingEnabled = false;
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = mapGround[y * MAP_W + x];
      if (t >= 0 && t < TOTAL_TILES) {
        const col = t % COLS;
        const row = Math.floor(t / COLS);
        tmpCtx.drawImage(tilesetImg,
          col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE,
          x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
      }
    }
  }
  const a = document.createElement('a');
  a.href = tmpCanvas.toDataURL('image/png');
  a.download = 'painted-map.png';
  a.click();
  showToast('PNG downloaded');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Keyboard: E for erase, P for paint, Delete/Backspace for clear cell
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (e.key === 'e' || e.key === 'E') setMode('erase');
  if (e.key === 'p' || e.key === 'P') setMode('paint');
  if (e.key === 'f' || e.key === 'F') setMode('fill');
  if (e.key === '1') setLayer('ground');
  if (e.key === '2') setLayer('objects');
  if (e.key === '3') setLayer('foreground');
  if (e.key === '[') setBrush(Math.max(1, brushW - 1), Math.max(1, brushH - 1));
  if (e.key === ']') setBrush(Math.min(MAP_W, brushW + 1), Math.min(MAP_H, brushH + 1));
});

// Resize handler
window.addEventListener('resize', () => { initMapCanvas(); renderMap(); });

// ── Drag-to-resize: tile panel (horizontal) and reference (vertical) ──
(function() {
  // Tile panel: drag right edge to resize width
  var tilePanel = document.getElementById('tilePanel');
  var tpDrag = false, tpStartX = 0, tpStartW = 0;
  tilePanel.addEventListener('mousedown', function(e) {
    // Only trigger on the right edge (last 6px)
    var rect = tilePanel.getBoundingClientRect();
    if (e.clientX > rect.right - 6) {
      tpDrag = true; tpStartX = e.clientX; tpStartW = rect.width;
      e.preventDefault();
    }
  });
  // Reference area: drag top edge to resize height
  var refArea = document.getElementById('refArea');
  var refDrag = false, refStartY = 0, refStartH = 0;
  refArea.addEventListener('mousedown', function(e) {
    // Only trigger on the top edge (first 6px)
    var rect = refArea.getBoundingClientRect();
    if (e.clientY < rect.top + 6) {
      refDrag = true; refStartY = e.clientY; refStartH = rect.height;
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (tpDrag) {
      var newW = tpStartW + (e.clientX - tpStartX);
      tilePanel.style.width = Math.max(150, Math.min(600, newW)) + 'px';
      initMapCanvas(); renderMap();
    }
    if (refDrag) {
      var newH = refStartH - (e.clientY - refStartY);
      refArea.style.height = Math.max(80, Math.min(500, newH)) + 'px';
      initMapCanvas(); renderMap();
    }
  });
  document.addEventListener('mouseup', function() { tpDrag = false; refDrag = false; });
})();
</script>
</body>
</html>
