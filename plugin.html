<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>Princess Sparkle</title>
  <link rel="stylesheet" href="plugin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <body oncontextmenu="return false">
  <script>
  (function () {
    // If we were launched with ?fresh=1, remove it from the URL and refresh once.
    var url = new URL(location.href);
    if (url.searchParams.get('fresh') === '1') {
      url.searchParams.delete('fresh');
      history.replaceState(null, '', url.toString()); // prevents a reload loop
      location.reload(); // acts like a user refresh
    }
  })();
</script>
  <header id="topbar">
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progressText">0 mins accounted for / 90 total mins</div>
    </div>
        <!-- Parent extras (visible only in Parent Mode; functionality later) -->
    <div id="parentExtrasWrap" class="hidden" role="group" aria-label="Parent options">
      <button id="demoToggle" aria-pressed="false" class="pill" title="Play the opening demo on launch">
        Demo: <span id="demoState">OFF</span>
      </button>

      <button id="parentLockToggle" aria-pressed="false" class="pill" title="Lock parent cards in non-Parent Mode">
        Parent lock: <span id="lockState">OFF</span>
      </button>
    </div>


    <button id="parentToggle" aria-pressed="false" title="Tap 5× quickly to toggle Parent Mode">
      Parent: <span id="parentState">OFF</span>
    </button>

    <div id="durationWrap" class="hidden">
      <label for="durationRange">Total time</label>
      <input id="durationRange" type="range" min="60" max="120" step="15" value="90" />
      <span id="durationValue">90</span> mins
    </div>
  </header>

  <main id="app">
    <section id="timelineSection">
      <div id="timeline" class="timeline"></div>
    </section>

    <section id="shelfSection" aria-label="Tonight's choices">
      <div id="shelf" class="shelf"></div>
      <p id="direction" role="status">Drag a book into the glowing slots</p>
      <button id="goBtn" class="go" disabled><span>✨ Go! ✨</span></button>
    </section>
    <!-- Parent-mode only: minutes per cookie -->
    <div id="cookieMinWrap" class="hidden">
      <label for="cookieMinRange">Minutes per cookie</label>
      <input id="cookieMinRange" type="range" min="5" max="60" step="5" value="5" />
      <span><b id="cookieMinValue">5</b> min</span>
    </div>
    <!-- Cookie bank -->
    <section id="cookieBankSection" aria-label="Cookie minutes">
      <div id="cookieHeader">
        <span>Sparkle Power</span>
        
        <span id="cookieSummary"><b id="cookieCount">0</b> × 5 min</span>
      </div>
      <div id="cookiePile" aria-label="Cookie pile"></div>
    </section>
  </main>

  <!-- Hand sprite for demo -->
  <div id="demoHand" class="hand hidden" aria-hidden="true"></div>

  
  <!-- Preboot watchdog + minimal debug dock -->
  
  
  

  <script src="update-checker.js"></script>
  <script src="debugger.js?v=4.44.4"></script>
  <script src="cloudGenerator.js?v=1.0"></script>
  <script src="plugin.js?v=1.17.2"></script>
</body>
</html>
